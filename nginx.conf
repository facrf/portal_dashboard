worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.php index.html;

        # Substitui o mod_rewrite do Apache (URLs amigáveis)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # A pasta gravável de ícones nunca pode executar scripts.
        location ~* ^/icons/.*\.(?:php|phtml|phar)(?:/|$) {
            deny all;
        }

        # Envia os arquivos .php para o PHP-FPM processar
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # Nega acesso a arquivos ocultos (como .git ou .env)
        location ~ /\. {
            deny all;
        }

        location ~* \.(?:db|sqlite|sqlite3|sql|bak)$ {
            deny all;
        }
    }
}