worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Oculta a versão do Nginx nos cabeçalhos (Endurecimento de Segurança)
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Pasta raiz definida no seu Dockerfile
        root /var/www/html;
        index index.php index.html;

        # ==========================================
        # 1. BLOQUEIO DE EXECUÇÃO: Pasta de ícones
        # ==========================================
        location ^~ /icons/ {
            # Tenta servir a imagem normalmente
            try_files $uri $uri/ =404;
            
            # Se tentar acessar .php aqui dentro, bloqueia imediatamente
            location ~ \.php$ {
                deny all;
            }
        }

        # ==========================================
        # 2. Roteamento Padrão
        # ==========================================
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ==========================================
        # 3. Processamento do PHP via FPM
        # ==========================================
        location ~ \.php$ {
            # Retorna 404 se o arquivo não existir (evita passar lixo pro FPM)
            try_files $uri =404;
            
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # Porta padrão do PHP-FPM na imagem oficial Alpine
            fastcgi_pass 127.0.0.1:9000; 
            
            fastcgi_index index.php;
            include fastcgi_params;
            
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # ==========================================
        # 4. Bloqueio de arquivos e pastas ocultas (.git, .env, etc)
        # ==========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}